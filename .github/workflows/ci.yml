# ============================================================
# .github/workflows/ci.yml
# GitHub Actions CI/CD Pipeline
#
# Pipeline Flow (matches project architecture diagram):
#   GitHub Push → Install → Test → Train Model → Docker Build
#
# This workflow runs automatically on every push to GitHub.
# ============================================================

name: ModelOps CI/CD Pipeline

on:
  push:
    branches:
      - "**"   # Trigger on push to any branch

jobs:

  # ============================================================
  # JOB 1: Install dependencies and train the ML model
  # ============================================================
  train-model:
    name: Install and Train Model
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Set up Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install Dependencies
        run: |
          cd backend
          pip install -r requirements.txt

      - name: Train ML Model
        run: |
          python backend/train_model.py

      - name: Verify model.pkl exists
        run: |
          ls -lh backend/model.pkl
          echo "Model trained and saved successfully"

      - name: Test API Import
        run: |
          cd backend
          python -c "from app import app; print('FastAPI app loads OK')"

      - name: Upload model artifact
        uses: actions/upload-artifact@v4
        with:
          name: trained-model
          path: backend/model.pkl
          retention-days: 7

  # ============================================================
  # JOB 2: Build Docker image (runs only after Job 1 passes)
  # ============================================================
  docker-build:
    name: Docker Image Build
    runs-on: ubuntu-latest
    needs: train-model

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Download trained model
        uses: actions/download-artifact@v3
        with:
          name: trained-model
          path: backend/

      - name: Build Docker Image
        run: |
          cd backend
          docker build -t modelops-api:latest .
          echo "Docker image built successfully"

      - name: Verify Docker Image
        run: |
          docker images | grep modelops-api

      - name: Test Docker Container Health
        run: |
          docker run -d -p 8000:8000 --name modelops-test modelops-api:latest
          sleep 5
          curl -f http://localhost:8000/ || true
          docker stop modelops-test
          echo "Docker container test complete"

# ============================================================
# HOW THIS MAPS TO THE PDF ARCHITECTURE:
#
# GitHub Commit
#     -> GitHub Actions (Build -> Test -> Train -> Docker Build)
#     -> Docker Image Updated
#     -> (In production) Push to Amazon ECR -> ECS/EC2 deploy
#     -> API Gateway routes traffic to running container
#     -> CloudWatch monitors logs and performance
# ============================================================
